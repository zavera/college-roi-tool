# Local prod-like profile: real Google OAuth + real auth, but HTTP-safe cookies.
# Run with: ./run-local-prod.sh (loads .env.local, activates this profile)

# Disable the dev bypass so Spring Security is fully active
premium.dev.bypass=false

# Keep H2 in-memory — no Postgres needed locally
# (base application.properties H2 defaults apply)

# Use NATIVE header strategy (plain HTTP, no proxy)
server.forward-headers-strategy=NATIVE

# HTTP-safe session cookie (no Secure flag — we're on http://localhost)
# SameSite=Lax is fine for same-site requests; Google callback is top-level GET
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.http-only=true

# Verbose Spring Security logging — shows filter chain decisions and OAuth2 state
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.oauth2=TRACE
logging.level.com.example.collegeroitool=DEBUG
