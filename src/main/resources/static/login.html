<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign In — Astra Financial Aid Advisor</title>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:       #0d1b2a;
    --navy-lt:    #1e3a5f;
    --primary:    #c9a84c;
    --primary-dk: #a07830;
    --bg:         #f8f7f4;
    --card:       #ffffff;
    --text:       #1a1a2e;
    --muted:      #6b7280;
    --border:     #e5e0d5;
    --error:      #b94040;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .auth-wrap {
    width: 100%;
    max-width: 420px;
  }
  .auth-brand {
    display: flex;
    align-items: center;
    gap: 12px;
    justify-content: center;
    margin-bottom: 32px;
  }
  .auth-brand img {
    width: 44px; height: 44px;
    object-fit: cover; border-radius: 9px;
  }
  .auth-brand-text { line-height: 1.2; }
  .auth-brand-text .product { font-family: 'Josefin Sans', sans-serif; font-size: 22px; font-weight: 300; color: #d4b49c; letter-spacing: 6px; text-transform: uppercase; }
  .auth-brand-text .tagline { font-family: 'Josefin Sans', sans-serif; font-size: 10px; font-weight: 300; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; }
  .auth-card {
    background: var(--card);
    border-radius: 14px;
    border: 1px solid var(--border);
    box-shadow: 0 4px 24px rgba(13,27,42,.07);
    padding: 36px 32px 32px;
  }
  .auth-card h1 {
    font-size: 20px; font-weight: 800;
    color: var(--navy); margin-bottom: 6px;
  }
  .auth-card .subtitle {
    font-size: 13px; color: var(--muted); margin-bottom: 28px;
  }
  .google-btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; padding: 11px 16px;
    border: 1.5px solid var(--border);
    border-radius: 8px; background: #fff;
    font-size: 14px; font-weight: 600; color: var(--text);
    text-decoration: none; cursor: pointer;
    transition: border-color .15s, box-shadow .15s;
    margin-bottom: 20px;
  }
  .google-btn:hover { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(201,168,76,.15); }
  .google-btn svg { flex-shrink: 0; }
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 20px; color: var(--muted); font-size: 12px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; font-weight: 700; color: var(--navy); margin-bottom: 5px; letter-spacing: .3px; }
  .field input {
    width: 100%; padding: 10px 12px;
    border: 1.5px solid var(--border); border-radius: 8px;
    font-size: 14px; color: var(--text); background: var(--bg);
    outline: none; transition: border-color .15s;
  }
  .field input:focus { border-color: var(--primary); background: #fff; }
  .submit-btn {
    width: 100%; padding: 12px;
    background: var(--navy); color: #fff;
    border: none; border-radius: 8px;
    font-size: 14px; font-weight: 700; cursor: pointer;
    transition: background .15s; margin-top: 4px;
  }
  .submit-btn:hover { background: var(--navy-lt); }
  .submit-btn:disabled { opacity: .6; cursor: default; }
  .error-box {
    display: none;
    background: #fef2f2; border: 1px solid #fca5a5;
    border-radius: 7px; padding: 10px 12px;
    font-size: 13px; color: var(--error);
    margin-bottom: 16px;
  }
  .auth-footer {
    text-align: center; margin-top: 20px;
    font-size: 13px; color: var(--muted);
  }
  .auth-footer a { color: var(--primary-dk); font-weight: 700; text-decoration: none; }
  .auth-footer a:hover { text-decoration: underline; }
  @media (max-width: 480px) {
    body { padding: 16px; }
    .auth-brand { margin-bottom: 22px; }
    .auth-card { padding: 24px 18px 22px; }
    .auth-brand-text .product { font-size: 18px; letter-spacing: 4px; }
  }
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-brand">
    <img src="/callisto_high.png" alt="Callisto">
    <div class="auth-brand-text">
      <div class="product">Astra</div>
      <div class="tagline">Financial Aid Advisor</div>
    </div>
  </div>

  <div class="auth-card">
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to access your personalized financial aid analysis.</p>

    <!-- Google -->
    <a href="/oauth2/authorization/google" class="google-btn">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.9 2.5 30.3 0 24 0 14.6 0 6.6 5.4 2.5 13.3l7.8 6C12.2 13.3 17.6 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.5 2.9-2.2 5.4-4.7 7l7.3 5.7c4.3-4 6.8-9.9 6.8-16.7z"/>
        <path fill="#FBBC05" d="M10.3 28.7A14.9 14.9 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7l-7.8-6A24 24 0 0 0 0 24c0 3.8.9 7.5 2.5 10.7l7.8-6z"/>
        <path fill="#34A853" d="M24 48c6.3 0 11.6-2.1 15.5-5.6l-7.3-5.7c-2.1 1.4-4.8 2.3-8.2 2.3-6.4 0-11.8-3.8-13.7-9.3l-7.8 6C6.6 42.6 14.6 48 24 48z"/>
      </svg>
      Continue with Google
    </a>

    <div class="divider">or sign in with email</div>

    <div class="error-box" id="errorBox"></div>

    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="username" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">Sign In</button>
    </form>

    <div class="auth-footer">
      No account? <a href="/register.html">Create one free</a>
    </div>
  </div>
  <p style="text-align:center;margin-top:16px;font-size:11px;color:#9ca3af;">
    By signing in you agree to our <a href="/privacy-policy.html" style="color:#a07830;font-weight:600;">Privacy Policy</a>.
  </p>
</div>

<script>
// Show error when redirected back from failed OAuth2 or form login
(function() {
  const params = new URLSearchParams(window.location.search);
  if (params.has('error')) {
    const err = document.getElementById('errorBox');
    const type = params.get('error');
    err.textContent = type === 'google'
      ? 'Google sign-in failed. Please try again or use email/password.'
      : 'Sign-in failed. Please check your credentials.';
    err.style.display = 'block';
  }
})();

document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('errorBox');
  btn.disabled = true;
  btn.textContent = 'Signing in…';
  err.style.display = 'none';

  const params = new URLSearchParams();
  params.append('username', document.getElementById('email').value.trim());
  params.append('password', document.getElementById('password').value);

  fetch('/api/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: params.toString()
  })
  .then(r => r.json())
  .then(data => {
    if (data.loggedIn) {
      window.location.href = '/';
    } else {
      throw new Error(data.error || 'Sign-in failed.');
    }
  })
  .catch(ex => {
    err.textContent = ex.message || 'Invalid email or password.';
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign In';
  });
});
</script>
</body>
</html>
