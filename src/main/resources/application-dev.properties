# Dev profile — bypasses OAuth and all pricing/paywall restrictions
# Safe to commit: contains no secrets. Secrets go in application-local.properties (gitignored).
premium.dev.bypass=true
spring.h2.console.enabled=true

# File-based H2 so data survives app restarts locally
spring.datasource.url=jdbc:h2:file:./data/astradb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
