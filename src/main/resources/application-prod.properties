# Production overrides — activated via SPRING_PROFILES_ACTIVE=prod in Railway
premium.dev.bypass=false
demo.mode=true
spring.h2.console.enabled=false

# Let Flyway own the schema on Postgres — ddl-auto=update silently skips
# adding non-null columns to existing tables, causing runtime column errors.
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
# Tell Flyway the existing prod DB is already at V1 so it doesn't try to re-create it.
# Safe to remove after the first successful deploy.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# Trust Railway's reverse-proxy headers so OAuth2 redirect URIs use https://
# Without this, Spring builds the redirect_uri as http:// → Google rejects it
server.forward-headers-strategy=framework

# Session cookie — must be explicit for Railway (TLS terminated at proxy)
# Secure=true: cookie only sent over HTTPS (browser sees HTTPS via Railway)
# SameSite=Lax: allows the cross-site redirect back from Google to carry the cookie
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.http-only=true
