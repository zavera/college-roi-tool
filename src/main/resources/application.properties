spring.application.name=college-roi-tool
spring.web.resources.static-locations=classpath:/static/
server.port=${PORT:8080}

# User config
app.user.email=zaver.ambreen@gmail.com

# Groq API config  (set GROQ_API_KEY as an environment variable in Railway)
groq.api.key=${GROQ_API_KEY:GROQ_KEY_SET_VIA_ENV}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.3-70b-versatile

# Premium dev bypass — set PREMIUM_DEV_BYPASS=false in Railway production env
premium.dev.bypass=${PREMIUM_DEV_BYPASS:true}

# Tavily API config — live search for 0% balance transfer / refinancing offers
# (set TAVILY_API_KEY as an environment variable in Railway; get a key at https://tavily.com)
tavily.api.key=${TAVILY_API_KEY:TAVILY_API_KEY_NOT_SET}

# Azure Document Intelligence — key-value extraction for FAFSA Prep tax document uploads
# (set AZURE_DOCINTEL_ENDPOINT/AZURE_DOCINTEL_KEY as environment variables in Railway)
azure.docintel.endpoint=${AZURE_DOCINTEL_ENDPOINT:AZURE_DOCINTEL_ENDPOINT_NOT_SET}
azure.docintel.key=${AZURE_DOCINTEL_KEY:AZURE_DOCINTEL_KEY_NOT_SET}

# File uploads — FAFSA Prep tax document uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Database ────────────────────────────────────────────────────────────────
# Local dev: H2 in-memory (no setup needed)
# Production (Railway): set DATABASE_URL env var → Postgres is auto-detected
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:astradb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=false
spring.jpa.show-sql=false
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.h2.console.enabled=${H2_CONSOLE:true}

# ── Google OAuth2 ──────────────────────────────────────────────────────────
# Set GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET in Railway (and local .env)
# Get credentials at: https://console.cloud.google.com/apis/credentials
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:GOOGLE_CLIENT_ID_NOT_SET}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:GOOGLE_CLIENT_SECRET_NOT_SET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# ── Stripe ─────────────────────────────────────────────────────────────────
stripe.secret.key=${STRIPE_SECRET_KEY:sk_test_placeholder}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY:pk_test_placeholder}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
stripe.price.id=${STRIPE_PRICE_ID:price_placeholder}

# ── Session ────────────────────────────────────────────────────────────────
server.servlet.session.timeout=7d

# ── Proxy / forwarded-headers (Railway + Cloudflare) ──────────────────────
# Trust X-Forwarded-Proto so Spring Security builds https:// redirect URIs
server.forward-headers-strategy=NATIVE
