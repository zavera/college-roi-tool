# H2 in-memory (default from application.properties, but explicit here for clarity)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Disable dev bypass — tests must exercise real Spring Security
premium.dev.bypass=false

# Dummy OAuth2 credentials (real Google flow is not tested; MockMvc is used)
spring.security.oauth2.client.registration.google.client-id=test-google-client-id
spring.security.oauth2.client.registration.google.client-secret=test-google-client-secret
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Dummy external keys — not called during auth tests
groq.api.key=test-groq-key
stripe.secret.key=sk_test_placeholder
stripe.publishable.key=pk_test_placeholder
stripe.webhook.secret=whsec_placeholder
stripe.price.id=price_placeholder
